name: Cloud Performance Test
on: [workflow_dispatch]

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
      - name: Launch Stress Test
        run: |
          # تثبيت أداة الفحص الرسمية
          sudo apt-get update && sudo apt-get install -y apache2-utils
          # إرسال مليون طلب بـ 1000 اتصال متزامن لتجاوز HAProxy
          ab -n 1000000 -c 1000 https://a2ztaxi.uk
